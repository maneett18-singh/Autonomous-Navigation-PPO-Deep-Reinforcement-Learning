program: ppo_continuos_seed_10.py
method: bayes
metric:
  name: mean_steps_to_best_solve
  goal: minimize

parameters:
  # Environment and experiment
  env-type:
    value: "parcour"  # or your specific environment
  num-seeds:
    value: 10
  total-timesteps:
    value: 50000
  
  # Tracking
  track:
    value: true
  wandb-project-name:
    value: "ppo-continuous-sweep"
  
  # PPO Core Hyperparameters
  learning-rate:
    distribution: log_uniform_values
    min: 0.00001
    max: 0.001
  
  num-steps:
    distribution: categorical
    values: [1024, 2048, 4096, 8192]
  
  update-epochs:
    distribution: int_uniform
    min: 3
    max: 20
  
  num-minibatches:
    distribution: categorical
    values: [16, 32, 64]
  
  # GAE parameters
  gamma:
    distribution: uniform
    min: 0.95
    max: 0.999
  
  gae-lambda:
    distribution: uniform
    min: 0.9
    max: 0.99
  
  # Loss coefficients
  clip-coef:
    distribution: uniform
    min: 0.1
    max: 0.3
  
  ent-coef:
    distribution: log_uniform_values
    min: 0.00001
    max: 0.01
  
  vf-coef:
    distribution: uniform
    min: 0.25
    max: 1.0
  
  max-grad-norm:
    distribution: uniform
    min: 0.3
    max: 1.0
  
  # Reward shaping weights (tune these based on your environment)
  w-dist:
    distribution: uniform
    min: 0.5
    max: 5.0
  
  w-dist-abs:
    distribution: uniform
    min: 0.0
    max: 0.1
  
  w-align:
    distribution: uniform
    min: 0.0
    max: 0.5
  
  w-speed:
    distribution: uniform
    min: 0.0
    max: 0.1
  
  w-ang:
    distribution: uniform
    min: 0.0
    max: 0.2
  
  w-time:
    distribution: uniform
    min: 0.0
    max: 0.05
  
  w-idle:
    distribution: uniform
    min: 0.0
    max: 0.3
